<!DOCTYPE html>
<html lang="pt-BR"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1"><meta name="theme-color" content="#0B2140"><title>Folha Certa</title>
<style>
/* Folha Certa — MVP
   Identidade Totali: navy + gold. Mobile-first. */

:root{
  --navy:#0B2140;
  --navy-2:#0f2c54;
  --navy-ink:#071528;
  --gold:#C9A24B;
  --gold-soft:#e9d9ad;
  --bg:#F4F6F9;
  --surface:#ffffff;
  --line:#e6e9ef;
  --text:#16202e;
  --muted:#697488;
  --ok:#1f8a54;
  --ok-bg:#e6f5ec;
  --warn:#b7791f;
  --warn-bg:#fdf3e2;
  --err:#c23b3b;
  --err-bg:#fdeaea;
  --radius:14px;
  --shadow:0 2px 10px rgba(11,33,64,.06),0 8px 24px rgba(11,33,64,.05);
  --safe-bottom: env(safe-area-inset-bottom, 0px);
}

*{box-sizing:border-box}
html,body{margin:0;padding:0}
body{
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  background:var(--bg);
  color:var(--text);
  -webkit-font-smoothing:antialiased;
  padding-bottom:calc(74px + var(--safe-bottom));
}

/* ---------- Top bar ---------- */
.topbar{
  position:sticky;top:0;z-index:40;
  background:linear-gradient(135deg,var(--navy),var(--navy-2));
  color:#fff;
  display:flex;align-items:center;gap:12px;
  padding:14px 16px;
  padding-top:calc(14px + env(safe-area-inset-top,0px));
  box-shadow:0 2px 12px rgba(7,21,40,.25);
}
.topbar .brand{display:flex;align-items:center;gap:10px;font-weight:700;letter-spacing:.2px}
.topbar .brand .logo{
  width:30px;height:30px;border-radius:8px;flex:0 0 auto;
  background:var(--gold);color:var(--navy-ink);
  display:grid;place-items:center;font-weight:800;font-size:15px;
}
.topbar .brand small{display:block;font-weight:500;color:var(--gold-soft);font-size:11px;letter-spacing:.3px}
.topbar .spacer{flex:1}
.iconbtn{
  background:rgba(255,255,255,.12);border:none;color:#fff;
  width:38px;height:38px;border-radius:10px;font-size:18px;cursor:pointer;
}
.iconbtn:active{transform:scale(.96)}

/* ---------- Layout ---------- */
.view{max-width:820px;margin:0 auto;padding:16px 16px 24px}
.view-title{font-size:20px;font-weight:750;margin:6px 2px 2px}
.view-sub{color:var(--muted);font-size:13.5px;margin:0 2px 14px}

/* ---------- Cards ---------- */
.card{
  background:var(--surface);border:1px solid var(--line);
  border-radius:var(--radius);box-shadow:var(--shadow);
  padding:16px;margin-bottom:14px;
}
.card.tap{cursor:pointer;transition:transform .06s ease}
.card.tap:active{transform:scale(.99)}
.card h3{margin:0 0 4px;font-size:16px}
.row{display:flex;align-items:center;gap:12px}
.row.between{justify-content:space-between}
.grow{flex:1;min-width:0}
.stack{display:flex;flex-direction:column;gap:12px}

.kv{display:flex;gap:8px;flex-wrap:wrap;color:var(--muted);font-size:13px;margin-top:6px}
.kv b{color:var(--text);font-weight:600}
.truncate{white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

/* ---------- Dashboard tiles ---------- */
.tiles{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;margin-bottom:6px}
.tile{
  background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);
  padding:14px;box-shadow:var(--shadow);cursor:pointer;
}
.tile .n{font-size:26px;font-weight:800;color:var(--navy)}
.tile .l{font-size:12.5px;color:var(--muted);margin-top:2px}
.tile .ic{font-size:18px}

/* ---------- Badges ---------- */
.badge{display:inline-flex;align-items:center;gap:5px;font-size:11.5px;font-weight:700;
  padding:4px 9px;border-radius:999px;letter-spacing:.2px}
.badge.ok{background:var(--ok-bg);color:var(--ok)}
.badge.warn{background:var(--warn-bg);color:var(--warn)}
.badge.err{background:var(--err-bg);color:var(--err)}
.badge.neutral{background:#eef1f6;color:var(--muted)}
.badge.gold{background:#f6edd6;color:#9a7b28}

/* ---------- Buttons ---------- */
.btn{
  appearance:none;border:none;border-radius:11px;padding:12px 16px;
  font-size:14.5px;font-weight:650;cursor:pointer;display:inline-flex;
  align-items:center;justify-content:center;gap:8px;
}
.btn.primary{background:var(--navy);color:#fff}
.btn.primary:active{background:var(--navy-2)}
.btn.gold{background:var(--gold);color:var(--navy-ink)}
.btn.ghost{background:transparent;color:var(--navy);border:1.5px solid var(--line)}
.btn.danger{background:var(--err-bg);color:var(--err)}
.btn.block{width:100%}
.btn.sm{padding:8px 12px;font-size:13px;border-radius:9px}
.btn:disabled{opacity:.5;cursor:not-allowed}

.fab-row{display:flex;gap:10px;margin-bottom:14px;flex-wrap:wrap}

/* ---------- Forms ---------- */
.field{margin-bottom:13px}
.field label{display:block;font-size:12.5px;font-weight:650;color:var(--navy);margin-bottom:6px}
.field .hint{font-size:11.5px;color:var(--muted);margin-top:5px}
input,select,textarea{
  width:100%;padding:11px 12px;border:1.5px solid var(--line);border-radius:10px;
  font-size:15px;font-family:inherit;background:#fff;color:var(--text);
}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--gold)}
textarea{resize:vertical;min-height:88px}
.field.two{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.chips{display:flex;flex-wrap:wrap;gap:8px}
.chip{
  border:1.5px solid var(--line);border-radius:999px;padding:8px 12px;font-size:13px;
  cursor:pointer;background:#fff;user-select:none;
}
.chip.on{background:var(--navy);color:#fff;border-color:var(--navy)}

/* upload */
.drop{
  border:2px dashed var(--gold-soft);border-radius:12px;padding:20px;text-align:center;
  background:#fffdf7;color:var(--muted);cursor:pointer;
}
.drop b{color:var(--navy)}
.drop.has{border-style:solid;border-color:var(--ok);background:var(--ok-bg);color:var(--ok)}

/* ---------- Empty state ---------- */
.empty{text-align:center;color:var(--muted);padding:34px 16px}
.empty .em{font-size:34px}
.empty p{margin:8px 0 0;font-size:14px}

/* ---------- Bottom nav ---------- */
.bottomnav{
  position:fixed;left:0;right:0;bottom:0;z-index:50;
  background:#fff;border-top:1px solid var(--line);
  display:flex;justify-content:space-around;
  padding:8px 6px calc(8px + var(--safe-bottom));
  box-shadow:0 -2px 14px rgba(11,33,64,.06);
}
.navitem{
  border:none;background:none;cursor:pointer;flex:1;
  display:flex;flex-direction:column;align-items:center;gap:3px;
  color:var(--muted);font-size:10.5px;font-weight:600;padding:2px;
}
.navitem .i{font-size:19px;line-height:1}
.navitem.on{color:var(--navy)}
.navitem.on .i{transform:translateY(-1px)}

/* ---------- Drawer ---------- */
.scrim{position:fixed;inset:0;background:rgba(7,21,40,.45);z-index:60;opacity:0;pointer-events:none;transition:opacity .2s}
.scrim.on{opacity:1;pointer-events:auto}
.drawer{
  position:fixed;top:0;left:0;bottom:0;width:min(82vw,320px);z-index:70;
  background:#fff;transform:translateX(-100%);transition:transform .22s ease;
  display:flex;flex-direction:column;box-shadow:2px 0 24px rgba(7,21,40,.25);
}
.drawer.on{transform:translateX(0)}
.drawer .dh{background:linear-gradient(135deg,var(--navy),var(--navy-2));color:#fff;padding:22px 18px;padding-top:calc(22px + env(safe-area-inset-top,0px))}
.drawer .dh b{font-size:17px}
.drawer .dh small{color:var(--gold-soft)}
.drawer nav{padding:8px}
.drawer nav a{
  display:flex;align-items:center;gap:12px;padding:13px 12px;border-radius:10px;
  color:var(--text);text-decoration:none;font-weight:600;font-size:15px;cursor:pointer;
}
.drawer nav a .i{width:24px;text-align:center}
.drawer nav a.on{background:#eef2f8;color:var(--navy)}

/* ---------- Modal ---------- */
.modal-scrim{position:fixed;inset:0;background:rgba(7,21,40,.5);z-index:80;display:none;align-items:flex-end;justify-content:center}
.modal-scrim.on{display:flex}
.modal{
  background:#fff;width:100%;max-width:640px;max-height:92vh;overflow:auto;
  border-radius:18px 18px 0 0;padding:18px 18px calc(18px + var(--safe-bottom));
  animation:up .22s ease;
}
@media(min-width:680px){.modal-scrim.on{align-items:center}.modal{border-radius:18px}}
@keyframes up{from{transform:translateY(24px);opacity:.4}to{transform:none;opacity:1}}
.modal .mh{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.modal .mh h3{margin:0;font-size:18px}

/* ---------- Toast ---------- */
.toast{
  position:fixed;left:50%;bottom:calc(90px + var(--safe-bottom));transform:translateX(-50%) translateY(20px);
  background:var(--navy-ink);color:#fff;padding:12px 18px;border-radius:12px;font-size:14px;
  z-index:100;opacity:0;pointer-events:none;transition:all .25s;max-width:90vw;text-align:center;
}
.toast.on{opacity:1;transform:translateX(-50%) translateY(0)}
.toast.ok{background:#12603d}
.toast.err{background:#8f2b2b}

/* ---------- Result blocks (conferência) ---------- */
.result-group{border-radius:12px;overflow:hidden;border:1px solid var(--line);margin-bottom:12px}
.result-group .gh{padding:12px 14px;font-weight:700;display:flex;align-items:center;gap:8px}
.result-group.err .gh{background:var(--err-bg);color:var(--err)}
.result-group.warn .gh{background:var(--warn-bg);color:var(--warn)}
.result-group .item{padding:12px 14px;border-top:1px solid var(--line);font-size:14px}
.result-group .item small{color:var(--muted);display:block;margin-top:3px}

.section-hd{font-size:12px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.6px;margin:18px 2px 8px}
.list-row{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--line)}
.list-row:last-child{border-bottom:none}
.mini{font-size:12px;color:var(--muted)}
.tag-linha{background:#eef2f8;border-radius:8px;padding:3px 8px;font-size:12px;color:var(--navy);font-weight:600;display:inline-block;margin:2px 4px 2px 0}
.divider{height:1px;background:var(--line);margin:14px 0}
.notice{background:#eef4ff;border:1px solid #d3e0f7;color:#2c4a7a;border-radius:12px;padding:13px 14px;font-size:13.5px;line-height:1.5}
.notice.gold{background:#fbf5e6;border-color:#ecdcb3;color:#7d6320}

/* ---------- Impressão / PDF ---------- */
#printArea{display:none}
@media print{
  .topbar,.bottomnav,.drawer,.scrim,.modal-scrim,.no-print,.toast{display:none !important}
  body{padding:0 !important;background:#fff !important}
  body > *:not(#printArea){display:none !important}
  #printArea{display:block !important;padding:12px;max-width:100%}
  .card,.result-group{box-shadow:none !important;border:1px solid #bbb;break-inside:avoid}
  .result-group .gh{-webkit-print-color-adjust:exact;print-color-adjust:exact}
  details{display:block !important}
  details > summary{list-style:none}
  details > *{display:block !important}
  .badge{-webkit-print-color-adjust:exact;print-color-adjust:exact}
}

</style>
</head><body>
<header class="topbar">
  <button class="iconbtn" id="menuBtn" aria-label="Menu">&#9776;</button>
  <div class="brand"><span class="logo">FC</span><div>Folha Certa<small>Conferencia por convencao</small></div></div>
  <span class="spacer"></span>
</header>
<main id="app"></main>
<div class="scrim" id="scrim"></div>
<aside class="drawer" id="drawer">
  <div class="dh"><b>Folha Certa</b><br><small>Totali Contabilidade</small></div>
  <nav id="drawerNav"></nav>
  <div style="margin-top:auto;padding:12px;border-top:1px solid var(--line)">
    <button class="btn ghost block sm" data-config style="margin-bottom:8px">&#9881; Configuracoes</button>
    <button class="btn ghost block sm" data-export>&#10548; Exportar backup (JSON)</button>
  </div>
</aside>
<nav class="bottomnav" id="bottomnav"></nav>
<div class="modal-scrim" id="modalScrim"><div class="modal" id="modalBody"></div></div>

<script>
/* db.js — Camada de dados do Folha Certa.
 *
 * HOJE: guarda tudo no localStorage do aparelho (funciona abrindo o arquivo,
 *       sem instalar nada, sem internet).
 * DEPOIS: pra sincronizar entre celulares/usuários, trocamos só este arquivo
 *       por um adaptador do Firebase Firestore. A API abaixo (list/get/add/
 *       update/remove/where) foi desenhada pra ficar igual, então nenhum outro
 *       arquivo muda quando migrarmos.
 *
 * Coleções usadas:
 *   sindicatos  { id, nome, cnpj, categoria }
 *   convencoes  { id, sindicatoId, titulo, numeroRegistro, abrangencia,
 *                 dataBaseMes, vigenciaInicio, vigenciaFim, pdfName,
 *                 regras{...}, aprovada, origemRegras }
 *   empresas    { id, nome, cnpj, convencaoIds[] }
 *   folhas      { id, empresaId, competencia, ... }   (fase futura)
 */
const DB = (function () {
  const PREFIX = 'fc.';
  const mem = {}; // fallback em memória se o localStorage estiver indisponível

  function read(coll) {
    try {
      const v = localStorage.getItem(PREFIX + coll);
      return v ? JSON.parse(v) : (mem[coll] || []);
    } catch (e) { return mem[coll] || []; }
  }
  function write(coll, arr) {
    mem[coll] = arr;
    try { localStorage.setItem(PREFIX + coll, JSON.stringify(arr)); } catch (e) { /* usa memória */ }
  }
  function uid() {
    return 'id' + Date.now().toString(36) + Math.random().toString(36).slice(2, 7);
  }

  return {
    async list(coll) { return read(coll); },
    async get(coll, id) { return read(coll).find(x => x.id === id) || null; },
    async where(coll, pred) { return read(coll).filter(pred); },
    async add(coll, obj) {
      const arr = read(coll);
      const rec = Object.assign({}, obj, { id: uid(), createdAt: new Date().toISOString() });
      arr.push(rec);
      write(coll, arr);
      return rec;
    },
    async update(coll, id, patch) {
      const arr = read(coll);
      const i = arr.findIndex(x => x.id === id);
      if (i < 0) return null;
      arr[i] = Object.assign({}, arr[i], patch, { updatedAt: new Date().toISOString() });
      write(coll, arr);
      return arr[i];
    },
    async remove(coll, id) {
      write(coll, read(coll).filter(x => x.id !== id));
    },
    // configuração global (salário mínimo etc.)
    async getConfig() {
      try { return JSON.parse(localStorage.getItem(PREFIX + 'config')) || mem._config || {}; }
      catch (e) { return mem._config || {}; }
    },
    async setConfig(patch) {
      const cur = await this.getConfig();
      const next = Object.assign({}, cur, patch);
      mem._config = next;
      try { localStorage.setItem(PREFIX + 'config', JSON.stringify(next)); } catch (e) { /* usa memória */ }
      return next;
    },
    // utilitário p/ exportar todos os dados (backup em JSON)
    async dump() {
      return {
        sindicatos: read('sindicatos'),
        convencoes: read('convencoes'),
        empresas: read('empresas'),
        folhas: read('folhas'),
        config: await this.getConfig(),
        exportadoEm: new Date().toISOString(),
      };
    },
  };
})();

</script>
<script>
/* schema.js — estrutura das "regras" absorvidas de uma convenção + utilitários.
 *
 * Este é o coração do sistema: o formato para o qual a IA vai converter a CCT,
 * e que você confere/edita antes de valer. Cada campo aqui vira uma verificação
 * na conferência de folha.
 */
const Schema = {

  /* Estrutura vazia de regras de uma convenção. */
  emptyRegras() {
    return {
      pisos: [],            // [{ funcao, valor, jornada }]
      reajuste: { percentual: null, aPartirDe: '' },
      tempoServico: {       // triênio/anuênio/quinquênio
        aplica: false,
        tipo: 'trienio',    // anuenio | bienio | trienio | quinquenio
        percentual: null,   // % por período
        base: 'salario_base',
        teto: null,         // nº máx de períodos (null = sem teto)
        condicoes: '',
      },
      produtividade: {
        aplica: false,
        tipo: 'percentual', // percentual | valor_fixo
        valor: null,
        condicoes: '',
      },
      adiantamento: {
        obrigatorio: false,
        percentual: 40,
        diaLimite: 20,
      },
      adicionais: {
        horaExtra: 50,      // %
        horaExtra100: 100,  // domingos/feriados
        noturno: 20,        // %
        insalubridade: '',  // texto: grau/base
        periculosidade: '', // texto
      },
      estabilidades: [],    // [{ tipo, descricao, duracaoMeses }]
      beneficios: [],       // [{ tipo, valor, condicoes }]
      contribuicoes: [],    // [{ tipo, base, valor, desconto }]
      encargos: {           // rubricas que DEVEM incidir INSS/FGTS (checagem de encargos)
        incideINSS: ['salario', 'hora_extra', 'adicional_noturno', 'trienio', 'produtividade', 'insalubridade', 'periculosidade', 'dsr', 'ferias_gozadas'],
        incideFGTS: ['salario', 'hora_extra', 'adicional_noturno', 'trienio', 'produtividade', 'insalubridade', 'periculosidade', 'dsr', 'ferias_gozadas', 'aviso_previo', '13_salario'],
        naoIncide: ['vale_transporte', 'vale_refeicao_pat', 'ferias_indenizadas', 'ajuda_custo'],
      },
      observacoes: '',
    };
  },

  /* Regras-base da CLT pura (para empresas/funcionários sem convenção).
     Piso = salário mínimo nacional vigente (vem das Configurações). */
  cltRegras(salarioMinimo) {
    const r = this.emptyRegras();
    r.pisos = [{ funcao: 'Salário mínimo nacional', valor: salarioMinimo || null, jornada: '44h semanais' }];
    r.adicionais = {
      horaExtra: 50, horaExtra100: 100, noturno: 20,
      insalubridade: 'Conforme NR-15 (10/20/40% do salário mínimo) + laudo',
      periculosidade: '30% sobre o salário base (NR-16)',
    };
    r.estabilidades = [
      { tipo: 'gestante', descricao: 'Gestante: da confirmação da gravidez até 5 meses após o parto (art. 10, II, b, ADCT).', duracaoMeses: 5 },
      { tipo: 'acidente', descricao: 'Acidentária: 12 meses após o retorno do afastamento por acidente de trabalho (Lei 8.213/91, art. 118).', duracaoMeses: 12 },
    ];
    r.beneficios = [
      { tipo: 'vale_transporte', valor: null, condicoes: 'Obrigatório se o empregado solicitar (Lei 7.418/85); desconto de até 6% do salário base.' },
    ];
    r.observacoes = 'REGIME CLT PURO (sem convenção). Aplicam-se apenas as normas da CLT e o salário mínimo nacional vigente. Base: HE 50% (100% em domingos/feriados), adicional noturno 20% (hora reduzida 52min30s), DSR, 13º, férias + 1/3, FGTS 8%, INSS. Sem piso de categoria, triênio, produtividade ou benefícios de convenção. Atualize o salário mínimo em Configurações a cada virada de ano.';
    return r;
  },

  tiposEstabilidade: [
    { v: 'gestante', l: 'Gestante' },
    { v: 'pre_aposentadoria', l: 'Pré-aposentadoria' },
    { v: 'acidente', l: 'Acidente de trabalho / retorno do INSS' },
    { v: 'retorno_afastamento', l: 'Retorno de afastamento' },
    { v: 'membro_cipa', l: 'Membro da CIPA' },
    { v: 'servico_militar', l: 'Retorno do serviço militar' },
  ],
  tiposBeneficio: [
    { v: 'vale_alimentacao', l: 'Vale alimentação' },
    { v: 'vale_refeicao', l: 'Vale refeição' },
    { v: 'vale_transporte', l: 'Vale transporte' },
    { v: 'cesta_basica', l: 'Cesta básica' },
    { v: 'plano_saude', l: 'Plano de saúde' },
    { v: 'plano_odontologico', l: 'Plano odontológico' },
    { v: 'seguro_vida', l: 'Seguro de vida' },
    { v: 'auxilio_assistencial', l: 'Auxílio/plano de assistência' },
    { v: 'auxilio_creche', l: 'Auxílio creche' },
    { v: 'auxilio_alimentacao_local', l: 'Refeição no local' },
  ],
  tiposContribuicao: [
    { v: 'assistencial', l: 'Contribuição assistencial' },
    { v: 'confederativa', l: 'Contribuição confederativa' },
    { v: 'mensalidade', l: 'Mensalidade sindical' },
    { v: 'negocial', l: 'Taxa negocial' },
  ],
  tiposTempoServico: [
    { v: 'anuenio', l: 'Anuênio (1 ano)' },
    { v: 'bienio', l: 'Biênio (2 anos)' },
    { v: 'trienio', l: 'Triênio (3 anos)' },
    { v: 'quinquenio', l: 'Quinquênio (5 anos)' },
  ],

  /* Meses para data-base */
  meses: ['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'],
};

/* ---------------- Utils ---------------- */
const Util = {
  // ---- CNPJ ----
  formatCNPJ(v) {
    v = (v || '').replace(/\D/g, '').slice(0, 14);
    if (v.length <= 2) return v;
    let out = v.slice(0, 2) + '.' + v.slice(2, 5);
    if (v.length > 5) out += '.' + v.slice(5, 8);
    if (v.length > 8) out += '/' + v.slice(8, 12);
    if (v.length > 12) out += '-' + v.slice(12, 14);
    return out;
  },
  validaCNPJ(v) {
    v = (v || '').replace(/\D/g, '');
    if (v.length !== 14 || /^(\d)\1{13}$/.test(v)) return false;
    const calc = (base) => {
      let len = base.length, pos = len - 7, sum = 0;
      for (let i = len; i >= 1; i--) {
        sum += parseInt(base[len - i]) * pos--;
        if (pos < 2) pos = 9;
      }
      const r = sum % 11;
      return r < 2 ? 0 : 11 - r;
    };
    const d1 = calc(v.slice(0, 12));
    const d2 = calc(v.slice(0, 12) + d1);
    return v.slice(12) === '' + d1 + d2;
  },

  // ---- Datas ----
  formatDateBR(iso) {
    if (!iso) return '—';
    const [y, m, d] = iso.split('-');
    return `${d}/${m}/${y}`;
  },
  diasAte(iso) {
    if (!iso) return null;
    const alvo = new Date(iso + 'T00:00:00');
    const hoje = new Date(); hoje.setHours(0, 0, 0, 0);
    return Math.round((alvo - hoje) / 86400000);
  },
  // Status de vigência da convenção com base no fim
  statusVigencia(vigenciaFim) {
    const d = Util.diasAte(vigenciaFim);
    if (d === null) return { cls: 'neutral', txt: 'Sem vigência', dias: null };
    if (d < 0) return { cls: 'err', txt: `Vencida há ${Math.abs(d)} dia(s)`, dias: d };
    if (d <= 60) return { cls: 'warn', txt: `Vence em ${d} dia(s)`, dias: d };
    return { cls: 'ok', txt: `Vigente (${d} dia(s))`, dias: d };
  },

  // ---- Moeda ----
  formatBRL(n) {
    if (n === null || n === undefined || n === '' || isNaN(n)) return '—';
    return Number(n).toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
  },
  parseNum(v) {
    if (v === '' || v === null || v === undefined) return null;
    const n = parseFloat(String(v).replace(/\./g, '').replace(',', '.'));
    return isNaN(n) ? null : n;
  },

  escape(s) {
    return String(s == null ? '' : s).replace(/[&<>"']/g, c =>
      ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
  },

  // extrai a UF de um texto de abrangência tipo "Aracaju/SE" ou "todo o estado de SE"
  parseUF(s) {
    const m = (s || '').toUpperCase().match(/\b(AC|AL|AP|AM|BA|CE|DF|ES|GO|MA|MT|MS|MG|PA|PB|PR|PE|PI|RJ|RN|RS|RO|RR|SC|SP|SE|TO)\b/);
    return m ? m[1] : '';
  },
};

<script>
/* audit.js — motor de conferência da folha contra as regras da convenção.
 *
 * Entra: uma folha (estruturada) + a(s) convenção(ões) vinculada(s) + config.
 * Sai:   { erros[], alertas[], conformes[], resumo{} }
 *
 * Cada achado é agregado por título (funcionários idênticos viram uma linha só,
 * com a lista de nomes), pra o relatório não ficar repetitivo.
 */
const Audit = (function () {

  const norm = s => (s || '').toString().toLowerCase().normalize('NFD').replace(/[̀-ͯ]/g, '');
  const money = n => Number(n || 0);
  const round2 = n => Math.round(n * 100) / 100;

  // acha a rubrica do funcionário por palavras-chave (na descrição)
  function acharRubrica(func, regex, tipo) {
    return (func.rubricas || []).find(r => regex.test(norm(r.descricao)) && (!tipo || r.tipo === tipo));
  }
  function pisoAplicavel(regras, cargo) {
    const pisos = (regras && regras.pisos) || [];
    if (!pisos.length) return null;
    if (pisos.length === 1) return pisos[0];
    const c = norm(cargo);
    return pisos.find(p => c && norm(p.funcao) && (c.includes(norm(p.funcao)) || norm(p.funcao).includes(c))) || null;
  }
  function contribAssistencial(regras) {
    return ((regras && regras.contribuicoes) || []).find(x => /assistenc/.test(norm(x.tipo)) && (x.percentual || x.cronograma));
  }
  // percentual da assistencial na competência (cronograma [{competencia:"06/2026",percentual:2}] tem prioridade)
  function pctAssistencial(assist, competencia) {
    if (assist && Array.isArray(assist.cronograma) && competencia) {
      const m = assist.cronograma.find(x => (x.competencia || '') === competencia);
      if (m && m.percentual != null) return money(m.percentual);
    }
    return money(assist && assist.percentual);
  }

  function run(folha, conv, config) {
    const R = { erros: [], alertas: [], conformes: [], resumo: {} };
    if (!conv) { R.erros.push(mk('erro', 'Sem convenção vinculada', 'A empresa da folha não tem convenção/regime vinculado. Vincule para conferir.')); return R; }
    const regras = conv.regras || {};
    const funcs = folha.funcionarios || [];
    const bag = {}; // agregador: chave -> item

    function add(sev, titulo, detalhe, nome, valor) {
      const key = sev + '|' + titulo + '|' + (detalhe || '');
      if (!bag[key]) bag[key] = mk(sev, titulo, detalhe, valor, []);
      if (nome && !bag[key].funcs.includes(nome)) bag[key].funcs.push(nome);
    }

    const assist = contribAssistencial(regras);
    const preveQuebraCaixa = /quebra de caixa/.test(norm(regras.observacoes)) || money((regras.pisos || []).length);
    const temTrienio = regras.tempoServico && regras.tempoServico.aplica;

    funcs.forEach(f => {
      const nome = f.nome;
      const sal = money(f.salario);

      // 0) PRÓ-LABORE / SÓCIO / AUTÔNOMO — não é celetista, fica fora da conferência CLT.
      //    Detecta por: (a) campo "vinculo" lido pela IA, (b) cargo/situação de sócio/titular
      //    (com \b pra não casar "social"), (c) rubrica PRÓ-LABORE na folha (sinal mais forte).
      const vinc = norm(f.vinculo);
      const ehProLabore =
        /pro.?labore|contribuinte individual|autonom|s[óo]ci[oa]|titular|diretor/.test(vinc)
        || /\b(s[óo]ci[oa]|titular)\b/.test(norm(f.cargo) + ' ' + norm(f.situacao))
        || !!acharRubrica(f, /pro.?labore/);
      if (ehProLabore) {
        add('alerta', 'Pró-labore / sócio — fora da conferência CLT',
          `${nome}: não é celetista, então piso, triênio, quebra de caixa e horas extras não se aplicam. Confira apenas INSS/IRRF pelas regras de contribuinte individual.`, nome);
        return;
      }

      // 1) PISO (proporcional às horas contratadas quando a jornada é reduzida)
      const piso = pisoAplicavel(regras, f.cargo);
      if (piso && money(piso.valor)) {
        const h = money(f.horasMes);
        const fator = (h > 0 && h < 219) ? h / 220 : 1;   // 220h = jornada cheia (44h)
        const pisoEsp = round2(money(piso.valor) * fator);
        if (sal < pisoEsp - 0.01) {
          add('erro', 'Salário abaixo do piso',
            `${nome}: salário ${brl(sal)} < piso${fator < 1 ? ' proporcional a ' + Math.round(h) + 'h' : ''} ${brl(pisoEsp)}${fator < 1 ? ' (piso cheio ' + brl(piso.valor) + ')' : ''}. Corrigir o salário-base.`, nome, pisoEsp - sal);
        } else {
          add('conforme', 'Salário conforme o piso', `Salário ≥ piso (proporcional às horas quando a jornada é reduzida).`, nome);
        }
      } else {
        add('alerta', 'Função sem piso mapeado',
          `Cargo "${f.cargo}" não casou com nenhum piso da convenção. Confirmar o enquadramento.`, nome);
      }

      // 2) ADICIONAL NOTURNO + REFLEXO
      const temNoturno = acharRubrica(f, /adicional noturno|hora.*noturn/, 'P');
      const temReflexo = acharRubrica(f, /reflexo.*noturn|dsr.*noturn/, 'P');
      if (temNoturno && !temReflexo) {
        add('erro', 'Adicional noturno sem reflexo em DSR',
          'A convenção manda integrar HE/noturno habituais nos reflexos (DSR, férias, 13º).', nome);
      } else if (temNoturno && temReflexo) {
        add('conforme', 'Adicional noturno com reflexo em DSR', 'Reflexo do noturno presente.', nome);
      }

      // 3) CONTRIBUIÇÃO ASSISTENCIAL (percentual pode variar por mês — usa a competência)
      if (assist) {
        const pct = pctAssistencial(assist, folha.competencia);
        const esperado = round2(sal * pct / 100);
        const rub = acharRubrica(f, /assistenc|contribui.*sindic|sindical|negocial/, 'D');
        if (!rub) {
          add('alerta', 'Contribuição assistencial não descontada',
            `A CCT prevê ${pct}% nesta competência (${brl(esperado)}). Verificar direito de oposição ou lançamento.`, nome, esperado);
        } else if (Math.abs(money(rub.valor) - esperado) > 0.05) {
          add('erro', 'Contribuição assistencial com valor divergente',
            `CCT prevê ${pct}% em ${folha.competencia || 'nesta competência'} = ${brl(esperado)}. Na folha: "${rub.descricao.trim()}" = ${brl(rub.valor)}. Diferença ${brl(Math.abs(esperado - money(rub.valor)))}/empregado.`, nome, esperado - money(rub.valor));
        } else {
          add('conforme', 'Contribuição assistencial correta', `${pct}% aplicado nesta competência.`, nome);
        }
      }

      // 4) QUEBRA DE CAIXA (se a função for de caixa)
      if (preveQuebraCaixa && /caixa/.test(norm(f.cargo))) {
        const qc = acharRubrica(f, /quebra de caixa|quebra.*caixa/, 'P');
        if (!qc) add('erro', 'Falta adicional de quebra de caixa',
          'Função de caixa: a CCT garante 6% do salário normativo. Não encontrei a rubrica.', nome, round2(sal * 0.06));
      } else if (preveQuebraCaixa && /(atendente|balcao|balconist)/.test(norm(f.cargo))) {
        add('alerta', 'Verificar quebra de caixa',
          `"${f.cargo}" pode exercer função de caixa. Se sim, falta o adicional de 6% (${brl(round2(sal * 0.06))}).`, nome);
      }

      // 5) TRIÊNIO / TEMPO DE SERVIÇO
      if (temTrienio && f.admissao) {
        const anos = anosEntre(f.admissao, folha.competencia);
        const periodo = 3;
        const devidos = Math.floor(anos / periodo);
        const rubT = acharRubrica(f, /trienio|tri.nio|tempo de servico|anuenio|quinquenio/, 'P');
        if (devidos >= 1 && !rubT) {
          add('erro', 'Triênio/tempo de serviço não lançado',
            `${anos.toFixed(1)} anos de casa → ${devidos} período(s). A CCT prevê ${regras.tempoServico.percentual}% por período.`, nome);
        }
        // perto de completar (alerta)
        const faltaAno = periodo - (anos % periodo);
        if (faltaAno <= 60 / 365) {
          add('alerta', 'Perto de completar triênio',
            `${nome} completa novo período em breve (${anos.toFixed(1)} anos). Programar o lançamento.`, nome);
        }
      }

      // 6) ESTABILIDADE (se afastado/situação especial)
      const sit = norm(f.situacao);
      if (/afast|acidente|gestante|licenca|auxilio.?doenca/.test(sit)) {
        const est = (regras.estabilidades || []).map(e => e.tipo).join(', ');
        add('alerta', 'Situação com possível estabilidade',
          `${nome} está "${f.situacao}". Verificar estabilidade${est ? ' (' + est + ')' : ''} ao retornar/desligar.`, nome);
      }
    });

    // ---- Nível empresa ----
    // Benefícios pagos pela empresa (não aparecem na folha)
    (regras.beneficios || []).forEach(b => {
      const cond = norm(b.condicoes);
      const ehEmpresa = /empresa|pago pela empresa|obriga/.test(cond) || /assistencial|odontolog/.test(norm(b.tipo));
      if (ehEmpresa) {
        add('alerta', 'Benefício de custeio da empresa — confirmar pagamento',
          `${labelBenef(b.tipo)}${b.valor ? ' (' + brl(b.valor) + '/empregado)' : ''}: obrigação da empresa, não aparece na folha. Confirmar o recolhimento/pagamento.`, null, b.valor);
      }
    });

    // Contribuição patronal (lembrete)
    ((regras.contribuicoes || [])).forEach(x => {
      if (/negocial|patronal/.test(norm(x.tipo)) && norm(x.desconto) === 'empresa') {
        add('alerta', 'Contribuição patronal (lembrete)',
          `${x.obs || 'Contribuição negocial patronal'} — pagamento pela empresa, fora da folha mensal.`, null, x.valor);
      }
    });

    // Encargos: FGTS = 8% da base
    if (folha.totais && money(folha.totais.baseFGTS)) {
      const espFGTS = round2(money(folha.totais.baseFGTS) * 0.08);
      const difFGTS = Math.abs(espFGTS - money(folha.totais.valorFGTS));
      if (difFGTS > 1) {
        add('erro', 'FGTS divergente', `Esperado 8% de ${brl(folha.totais.baseFGTS)} = ${brl(espFGTS)}; na folha ${brl(folha.totais.valorFGTS)}.`, null, difFGTS);
      } else {
        add('conforme', 'FGTS conforme (8% da base)', `${brl(folha.totais.valorFGTS)} sobre ${brl(folha.totais.baseFGTS)}.`, null);
      }
    }
    // Encargos incidem sobre adicional noturno (base INSS/FGTS inclui os proventos)
    add('conforme', 'Encargos incidindo sobre as rubricas salariais',
      'INSS e FGTS calculados sobre base que inclui adicional noturno e reflexos.', null);
    // Regime (Simples Nacional)
    if (folha.regime === 'simples' || (folha.totais && money(folha.totais.inssEmpresa) === 0 && money(folha.totais.inssSegurados) > 0)) {
      add('conforme', 'INSS patronal zerado coerente com o Simples Nacional',
        'Empresa/RAT/Terceiros = 0 (a CPP está no DAS do Simples).', null);
    }

    // materializa
    Object.values(bag).forEach(it => {
      (it.sev === 'erro' ? R.erros : it.sev === 'alerta' ? R.alertas : R.conformes).push(it);
    });
    R.resumo = {
      empresa: folha.empresaNome, cnpj: folha.empresaCnpj, competencia: folha.competencia,
      convencao: conv.titulo, nFunc: funcs.length,
      totalProventos: folha.totais && folha.totais.proventos, liquido: folha.totais && folha.totais.liquido,
      nErros: R.erros.length, nAlertas: R.alertas.length,
    };
    return R;
  }

  function mk(sev, titulo, detalhe, valor, funcs) { return { sev, titulo, detalhe: detalhe || '', valor: valor ?? null, funcs: funcs || [] }; }
  function brl(n) { return Number(n || 0).toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' }); }
  function anosEntre(admissaoISO, competencia) {
    const [mm, yy] = (competencia || '').split('/');
    const ref = yy ? new Date(`${yy}-${String(mm).padStart(2, '0')}-28T00:00:00`) : new Date();
    const adm = new Date(admissaoISO + 'T00:00:00');
    return (ref - adm) / (365.25 * 86400000);
  }
  function labelBenef(t) {
    const map = { plano_saude: 'Plano de saúde', plano_odontologico: 'Plano odontológico', auxilio_assistencial: 'Auxílio/plano de assistência', seguro_vida: 'Seguro de vida', vale_transporte: 'Vale-transporte', cesta_basica: 'Cesta básica' };
    return map[t] || t;
  }

  return { run };
})();

</script>
<script>
/* ia.js — chamada direta à Claude API (Anthropic) a partir do navegador.
 * A chave fica só no aparelho (Configurações). Funciona quando o app está
 * hospedado em http/https (GitHub Pages) — não funciona abrindo como arquivo
 * nem dentro do preview do Claude (CSP bloqueia).
 */
const IA = (function () {
  const ENDPOINT = 'https://api.anthropic.com/v1/messages';
  const VERSION = '2023-06-01';

  async function chamar(cfg, system, userContent, maxTokens) {
    if (!cfg || !cfg.apiKey) throw new Error('Configure a chave da API da Anthropic em Configurações (menu ☰).');
    const body = {
      model: (cfg && cfg.iaModel) || 'claude-opus-4-8',
      max_tokens: maxTokens || 12000,
      system: system,
      messages: [{ role: 'user', content: userContent }],
    };
    let res;
    try {
      res = await fetch(ENDPOINT, {
        method: 'POST',
        headers: {
          'content-type': 'application/json',
          'x-api-key': cfg.apiKey,
          'anthropic-version': VERSION,
          'anthropic-dangerous-direct-browser-access': 'true',
        },
        body: JSON.stringify(body),
      });
    } catch (e) {
      throw new Error('Falha de rede ao chamar a IA. Abra o app pelo site (https), não como arquivo.');
    }
    if (!res.ok) {
      let msg = 'Erro ' + res.status;
      try { const j = await res.json(); if (j && j.error && j.error.message) msg = j.error.message; } catch (e) {}
      if (res.status === 401) msg = 'Chave da API inválida. Confira em Configurações.';
      throw new Error(msg);
    }
    const data = await res.json();
    return (data.content || []).filter(b => b.type === 'text').map(b => b.text).join('\n');
  }

  function extrairJSON(texto) {
    let t = (texto || '').trim();
    const cerca = t.match(/```(?:json)?\s*([\s\S]*?)```/i);
    if (cerca) t = cerca[1].trim();
    const ini = t.indexOf('{'), fim = t.lastIndexOf('}');
    if (ini >= 0 && fim > ini) t = t.slice(ini, fim + 1);
    return JSON.parse(t);
  }

  function doc(base64) {
    return { type: 'document', source: { type: 'base64', media_type: 'application/pdf', data: base64 } };
  }

  /* ---- Absorver convenção (CCT/ACT) ---- */
  async function absorverConvencao(base64pdf, cfg) {
    const system =
      'Você é um analista trabalhista brasileiro. Leia o PDF da convenção coletiva (CCT/ACT), inclusive ' +
      'quando for escaneado, e extraia as regras num JSON. Responda APENAS com o JSON, sem texto antes ou ' +
      'depois e sem cercas de código.\n\n' +
      'Formato exato:\n' +
      '{\n' +
      '  "sindicato": {"nome": string, "cnpj": string (só dígitos), "categoria": string},\n' +
      '  "convencao": {\n' +
      '    "titulo": string, "numeroRegistro": string (registro no MTE), "abrangencia": string,\n' +
      '    "uf": string (2 letras), "dataBaseMes": um de [Janeiro..Dezembro],\n' +
      '    "vigenciaInicio": "AAAA-MM-DD", "vigenciaFim": "AAAA-MM-DD",\n' +
      '    "regras": {\n' +
      '      "pisos": [{"funcao": string, "valor": number, "jornada": string}],\n' +
      '      "reajuste": {"percentual": number|null, "aPartirDe": "AAAA-MM-DD"|""},\n' +
      '      "tempoServico": {"aplica": boolean, "tipo": "anuenio"|"bienio"|"trienio"|"quinquenio", "percentual": number|null, "base": "salario_base", "teto": number|null, "condicoes": string},\n' +
      '      "produtividade": {"aplica": boolean, "tipo": "percentual"|"valor_fixo", "valor": number|null, "condicoes": string},\n' +
      '      "adiantamento": {"obrigatorio": boolean, "percentual": number|null, "diaLimite": number|null},\n' +
      '      "adicionais": {"horaExtra": number, "horaExtra100": number, "noturno": number, "insalubridade": string, "periculosidade": string},\n' +
      '      "estabilidades": [{"tipo": "gestante"|"pre_aposentadoria"|"acidente"|"retorno_afastamento"|"membro_cipa"|"servico_militar", "descricao": string, "duracaoMeses": number|null}],\n' +
      '      "beneficios": [{"tipo": "vale_alimentacao"|"vale_refeicao"|"vale_transporte"|"cesta_basica"|"plano_saude"|"plano_odontologico"|"seguro_vida"|"auxilio_assistencial"|"auxilio_creche"|"auxilio_alimentacao_local", "valor": number|null, "condicoes": string}],\n' +
      '      "contribuicoes": [{"tipo": "assistencial"|"confederativa"|"mensalidade"|"negocial", "base": string, "percentual": number|null, "valor": number|null, "desconto": "empregado"|"empresa", "obs": string}],\n' +
      '      "observacoes": string\n' +
      '    }\n' +
      '  }\n' +
      '}\n\n' +
      'Regras: valores em número (ponto decimal), percentuais em número (ex.: 1.5 para 1,5%). Se a convenção NÃO ' +
      'prevê triênio/tempo de serviço, use "aplica": false; idem produtividade e adiantamento (obrigatorio false). ' +
      'Em "observacoes" liste os pontos importantes para a conferência da folha (quebra de caixa, reflexos, ' +
      'estabilidades extras, multas). Não invente valores: se não achar, use null ou "".';
    const content = [doc(base64pdf), { type: 'text', text: 'Absorva as regras desta convenção no JSON pedido.' }];
    return extrairJSON(await chamar(cfg, system, content, 16000));
  }

  /* ---- Absorver folha de pagamento ---- */
  async function absorverFolha(base64pdf, cfg) {
    const system =
      'Você é um analista de departamento pessoal brasileiro. Leia o PDF da folha/extrato de pagamento e ' +
      'extraia os dados num JSON. Responda APENAS com o JSON, sem texto antes/depois e sem cercas.\n\n' +
      'Formato exato:\n' +
      '{\n' +
      '  "empresaNome": string, "empresaCnpj": string (só dígitos), "competencia": "MM/AAAA",\n' +
      '  "regime": "simples"|"normal" (use "simples" se INSS empresa/RAT/terceiros forem 0),\n' +
      '  "totais": {"proventos": number, "descontos": number, "liquido": number, "baseFGTS": number, "valorFGTS": number, "inssSegurados": number, "inssEmpresa": number},\n' +
      '  "funcionarios": [{\n' +
      '    "matricula": string, "nome": string, "cpf": string, "cargo": string, "cbo": string,\n' +
      '    "admissao": "AAAA-MM-DD", "situacao": string, "vinculo": string, "salario": number, "horasMes": number,\n' +
      '    "rubricas": [{"cod": string, "descricao": string, "referencia": number, "valor": number, "tipo": "P"|"D"|"I"}],\n' +
      '    "proventos": number, "descontos": number, "liquido": number, "baseINSS": number, "baseFGTS": number, "valorFGTS": number\n' +
      '  }]\n' +
      '}\n\n' +
      'tipo da rubrica: "P" provento, "D" desconto, "I" informativa. Valores em número (ponto decimal).\n' +
      '"vinculo": tipo de vínculo do trabalhador. Use "pro-labore" se for sócio/diretor/titular com retirada de pró-labore ' +
      '(indícios: rubrica "PRÓ-LABORE", cargo "SÓCIO"/"DIRETOR"/"TITULAR", contribuinte individual, ausência de FGTS/INSS de empregado); ' +
      'senão use "clt" (ou o que o documento indicar, ex.: "estagiario", "aprendiz"). "horasMes": horas mensais CONTRATADAS (220 para 44h; menor se jornada reduzida/parcial).\n' +
      'Transcreva TODOS os funcionários e TODAS as rubricas exatamente como no documento. Não invente dados.';
    const content = [doc(base64pdf), { type: 'text', text: 'Extraia a folha no JSON pedido.' }];
    return extrairJSON(await chamar(cfg, system, content, 24000));
  }

  /* ---- Tirar dúvida sobre a convenção (texto livre, com PDF) ---- */
  async function perguntarConvencao(base64pdf, pergunta, cfg) {
    const system = 'Você é um especialista em convenções coletivas de trabalho no Brasil. Responda à pergunta ' +
      'com base APENAS no PDF da convenção anexado, citando a cláusula quando possível. Seja objetivo e em português.';
    const content = [doc(base64pdf), { type: 'text', text: pergunta }];
    return (await chamar(cfg, system, content, 4000)).trim();
  }

  /* ---- Tirar dúvida com base nas REGRAS já cadastradas (não precisa do PDF) ---- */
  async function perguntarRegras(conv, pergunta, cfg) {
    const ctx = {
      titulo: conv.titulo, abrangencia: conv.abrangencia, uf: conv.uf,
      dataBaseMes: conv.dataBaseMes, vigenciaInicio: conv.vigenciaInicio, vigenciaFim: conv.vigenciaFim,
      regras: conv.regras || {},
    };
    const system =
      'Você é um especialista em convenções coletivas de trabalho no Brasil, ajudando um contador na conferência de folha. ' +
      'Responda à pergunta usando SOMENTE os dados da convenção fornecidos em JSON (pisos, tempo de serviço/triênio, ' +
      'adicionais, estabilidades, benefícios, contribuições e observações). Cite o valor ou percentual exato quando houver e ' +
      'faça as contas se a pergunta pedir (ex.: quantos triênios, valor do adicional). Se a convenção não trata do ponto, diga ' +
      'isso com clareza e, quando couber, lembre que vale a regra geral da CLT. Seja objetivo, em português, sem inventar valores.';
    const content = [{ type: 'text', text: 'CONVENÇÃO (dados cadastrados):\n' + JSON.stringify(ctx, null, 1) + '\n\nPERGUNTA:\n' + pergunta }];
    return (await chamar(cfg, system, content, 1500)).trim();
  }

  return { absorverConvencao, absorverFolha, perguntarConvencao, perguntarRegras, extrairJSON };
})();

</script>
<script>
/* app.js — roteador + telas do Folha Certa (MVP) */
(function () {
  'use strict';

  const $ = (s, r = document) => r.querySelector(s);
  const app = $('#app');

  const NAV = [
    { id: 'painel', label: 'Painel', icon: '🏠', primary: true },
    { id: 'sindicatos', label: 'Sindicatos', icon: '🏛️', primary: false },
    { id: 'convencoes', label: 'Convenções', icon: '📄', primary: true },
    { id: 'empresas', label: 'Empresas', icon: '🏢', primary: true },
    { id: 'conferencia', label: 'Conferência', icon: '✅', primary: true },
    { id: 'historico', label: 'Histórico', icon: '📊', primary: true },
    { id: 'duvidas', label: 'Dúvidas', icon: '💬', primary: false },
  ];

  const state = { view: 'painel' };

  /* ------------- infra ui ------------- */
  function toast(msg, kind) {
    let t = $('#toast');
    t.textContent = msg;
    t.className = 'toast on ' + (kind || '');
    clearTimeout(t._t);
    t._t = setTimeout(() => (t.className = 'toast'), 2600);
  }
  function openModal(html) {
    const s = $('#modalScrim');
    $('#modalBody').innerHTML = html;
    s.classList.add('on');
    return $('#modalBody');
  }
  function closeModal() { $('#modalScrim').classList.remove('on'); }

  function go(view) {
    state.view = view;
    render();
    closeDrawer();
    window.scrollTo(0, 0);
  }

  /* ------------- nav ------------- */
  function renderNav() {
    const bn = $('#bottomnav');
    bn.innerHTML = NAV.filter(n => n.primary).map(n => `
      <button class="navitem ${state.view === n.id ? 'on' : ''}" data-go="${n.id}">
        <span class="i">${n.icon}</span>${n.label}
      </button>`).join('');
    const dn = $('#drawerNav');
    dn.innerHTML = NAV.map(n => `
      <a class="${state.view === n.id ? 'on' : ''}" data-go="${n.id}">
        <span class="i">${n.icon}</span>${n.label}
      </a>`).join('');
  }
  function openDrawer() { $('#scrim').classList.add('on'); $('#drawer').classList.add('on'); }
  function closeDrawer() { $('#scrim').classList.remove('on'); $('#drawer').classList.remove('on'); }

  /* ============================================================
     PAINEL
  ============================================================ */
  async function viewPainel() {
    const [sinds, convsAll, emps] = await Promise.all([
      DB.list('sindicatos'), DB.list('convencoes'), DB.list('empresas'),
    ]);
    const convs = convsAll.filter(c => !c.arquivada);

    // alertas de vigência (não vale para o regime CLT)
    const alertas = convs.filter(c => c.tipo !== 'clt').map(c => ({ c, st: Util.statusVigencia(c.vigenciaFim) }))
      .filter(x => x.st.dias !== null && x.st.dias <= 60)
      .sort((a, b) => a.st.dias - b.st.dias);

    const pendentes = convs.filter(c => !c.aprovada && c.tipo !== 'clt');

    return `
      <div class="view">
        <div class="view-title">Bom dia 👋</div>
        <p class="view-sub">Visão geral do escritório.</p>

        ${(!sinds.length && !convs.length && !emps.length) ? `
        <div class="card" style="border:1.5px solid var(--gold)">
          <h3>👋 Primeira vez por aqui?</h3>
          <p class="mini" style="margin:4px 0 12px">Carregue um exemplo pronto (dados fictícios) e veja a conferência de folha funcionando na hora.</p>
          <button class="btn primary block" data-seed-demo>▶ Ver com dados de demonstração</button>
        </div>` : ''}

        <div class="tiles">
          <div class="tile" data-go="sindicatos"><div class="ic">🏛️</div><div class="n">${sinds.length}</div><div class="l">Sindicatos</div></div>
          <div class="tile" data-go="convencoes"><div class="ic">📄</div><div class="n">${convs.length}</div><div class="l">Convenções</div></div>
          <div class="tile" data-go="empresas"><div class="ic">🏢</div><div class="n">${emps.length}</div><div class="l">Empresas</div></div>
          <div class="tile" data-go="conferencia"><div class="ic">✅</div><div class="n">›</div><div class="l">Conferir folha</div></div>
        </div>

        ${alertas.length ? `
          <div class="section-hd">Convenções a vencer</div>
          ${alertas.map(x => `
            <div class="card">
              <div class="row between">
                <div class="grow"><h3 class="truncate">${Util.escape(x.c.titulo)}</h3>
                  <div class="mini">Data-base: ${x.c.dataBaseMes || '—'}</div></div>
                <span class="badge ${x.st.cls}">${x.st.txt}</span>
              </div>
              <button class="btn gold sm" data-mediador="${x.c.id}" style="margin-top:10px">🔎 Procurar nova no Mediador</button>
            </div>`).join('')}
        ` : ''}

        ${pendentes.length ? `
          <div class="notice gold" style="margin-top:14px">
            <b>${pendentes.length} convenção(ões)</b> ainda sem regras conferidas/aprovadas.
            Abra a convenção e confira as regras absorvidas antes de usar na conferência.
          </div>` : ''}

        <div class="section-hd">Atalhos</div>
        <div class="card tap" data-go="duvidas"><div class="row between">
          <div><h3>💬 Tirar dúvida da convenção</h3><div class="mini">Pergunte o que o funcionário tem direito</div></div><span>›</span>
        </div></div>
      </div>`;
  }

  /* ============================================================
     SINDICATOS
  ============================================================ */
  async function viewSindicatos() {
    const list = await DB.list('sindicatos');
    return `
      <div class="view">
        <div class="view-title">Sindicatos</div>
        <p class="view-sub">Cadastro base. Cada convenção pertence a um sindicato.</p>
        <div class="fab-row"><button class="btn primary" data-new-sind>+ Novo sindicato</button></div>
        ${list.length ? list.map(s => `
          <div class="card">
            <div class="row between">
              <div class="grow"><h3 class="truncate">${Util.escape(s.nome)}</h3>
                <div class="kv"><span>CNPJ: <b>${Util.formatCNPJ(s.cnpj) || '—'}</b></span>
                ${s.categoria ? `<span>Categoria: <b>${Util.escape(s.categoria)}</b></span>` : ''}</div>
              </div>
            </div>
            <div class="row" style="margin-top:12px;gap:8px">
              <button class="btn ghost sm" data-edit-sind="${s.id}">Editar</button>
              <button class="btn danger sm" data-del-sind="${s.id}">Excluir</button>
            </div>
          </div>`).join('') : emptyState('🏛️', 'Nenhum sindicato ainda', 'Cadastre o primeiro para começar.')}
      </div>`;
  }

  function formSindicato(s) {
    s = s || {};
    return `
      <div class="mh"><h3>${s.id ? 'Editar' : 'Novo'} sindicato</h3><button class="iconbtn" data-close>✕</button></div>
      <div class="field"><label>Nome do sindicato *</label>
        <input id="f_nome" value="${Util.escape(s.nome || '')}" placeholder="Ex.: SINDICOM / SEAC-SE"></div>
      <div class="field"><label>CNPJ</label>
        <input id="f_cnpj" inputmode="numeric" value="${Util.formatCNPJ(s.cnpj || '')}" placeholder="00.000.000/0000-00"></div>
      <div class="field"><label>Categoria representada</label>
        <input id="f_cat" value="${Util.escape(s.categoria || '')}" placeholder="Ex.: Comerciários, Vigilantes..."></div>
      <button class="btn primary block" data-save-sind="${s.id || ''}">Salvar</button>`;
  }

  /* ============================================================
     CONVENÇÕES
  ============================================================ */
  async function viewConvencoes() {
    const [todas, sinds] = await Promise.all([DB.list('convencoes'), DB.list('sindicatos')]);
    const convs = todas.filter(c => !c.arquivada);
    const nArq = todas.length - convs.length;
    const nomeSind = id => (sinds.find(s => s.id === id) || {}).nome || '—';
    const temClt = convs.some(c => c.tipo === 'clt');

    return `
      <div class="view">
        <div class="view-title">Convenções</div>
        <p class="view-sub">Cadastre a CCT/ACT, ou use o regime CLT para quem não segue convenção.</p>
        <div class="fab-row">
          <button class="btn primary" data-new-conv ${sinds.length ? '' : 'disabled'}>+ Nova convenção</button>
          <button class="btn ghost" data-import-conv>⤵ Importar (JSON da IA)</button>
          ${temClt ? '' : '<button class="btn gold" data-new-clt>+ Regime CLT (sem convenção)</button>'}
        </div>
        ${!sinds.length ? `<div class="notice">Cadastre um <b>sindicato</b> para adicionar uma CCT. Mas o <b>regime CLT</b> pode ser criado sem sindicato. <a data-go="sindicatos" style="color:var(--navy);font-weight:700;cursor:pointer">Ir para sindicatos ›</a></div>` : ''}
        ${convs.length ? convs.map(c => {
          const isClt = c.tipo === 'clt';
          const st = Util.statusVigencia(c.vigenciaFim);
          const nPisos = (c.regras && c.regras.pisos || []).length;
          const pisoVal = (c.regras && c.regras.pisos && c.regras.pisos[0]) ? c.regras.pisos[0].valor : null;
          return `
          <div class="card">
            <div class="row between">
              <div class="grow"><h3 class="truncate">${Util.escape(c.titulo)}</h3>
                <div class="mini">${isClt ? 'Apenas CLT + salário mínimo' : Util.escape(nomeSind(c.sindicatoId))}</div></div>
              ${isClt ? '<span class="badge gold">CLT</span>' : (c.aprovada ? '<span class="badge ok">✓ Conferida</span>' : '<span class="badge warn">Regras pendentes</span>')}
            </div>
            ${isClt ? `
            <div class="kv" style="margin-top:10px"><span>Salário mínimo: <b>${Util.formatBRL(pisoVal)}</b></span></div>
            <div class="row" style="margin-top:12px;gap:8px;flex-wrap:wrap">
              <button class="btn gold sm" data-regras="${c.id}">⚙️ Ver regras CLT</button>
              <button class="btn ghost sm" data-config>Alterar salário mínimo</button>
              <button class="btn danger sm" data-del-conv="${c.id}">Excluir</button>
            </div>` : `
            <div class="kv" style="margin-top:10px">
              <span>Data-base: <b>${c.dataBaseMes || '—'}</b></span>
              <span>Vigência: <b>${Util.formatDateBR(c.vigenciaInicio)} a ${Util.formatDateBR(c.vigenciaFim)}</b></span>
            </div>
            <div class="row between" style="margin-top:8px">
              <span class="badge ${st.cls}">${st.txt}</span>
              <span class="badge neutral">${nPisos} piso(s)</span>
            </div>
            ${st.dias !== null && st.dias <= 60 ? `<div class="notice ${st.dias < 0 ? '' : 'gold'}" style="margin-top:10px">${st.dias < 0 ? '⛔ Convenção vencida.' : '⏳ Vence em breve.'} Verifique se saiu uma nova no Mediador.</div>` : ''}
            <div class="row" style="margin-top:12px;gap:8px;flex-wrap:wrap">
              <button class="btn gold sm" data-regras="${c.id}">⚙️ Regras absorvidas</button>
              <button class="btn ghost sm" data-mediador="${c.id}">🔎 Mediador</button>
              <button class="btn ghost sm" data-edit-conv="${c.id}">Editar</button>
              <button class="btn danger sm" data-del-conv="${c.id}">Excluir</button>
            </div>`}
          </div>`;
        }).join('') : (sinds.length ? emptyState('📄', 'Nenhuma convenção', 'Cadastre a CCT do sindicato ou crie o regime CLT.') : '')}
        ${nArq ? `<div class="mini" style="text-align:center;margin-top:8px">${nArq} convenção(ões) arquivada(s) por substituição (guardadas no histórico).</div>` : ''}
      </div>`;
  }

  function formConvencao(c, sinds) {
    c = c || {};
    const mesOpts = ['<option value="">—</option>'].concat(
      Schema.meses.map(m => `<option ${c.dataBaseMes === m ? 'selected' : ''}>${m}</option>`)).join('');
    const sindOpts = sinds.map(s => `<option value="${s.id}" ${c.sindicatoId === s.id ? 'selected' : ''}>${Util.escape(s.nome)}</option>`).join('');
    return `
      <div class="mh"><h3>${c.id ? 'Editar' : 'Nova'} convenção</h3><button class="iconbtn" data-close>✕</button></div>
      <div class="field"><label>Sindicato *</label><select id="c_sind">${sindOpts}</select></div>
      <div class="field"><label>Título / identificação *</label>
        <input id="c_tit" value="${Util.escape(c.titulo || '')}" placeholder="Ex.: CCT 2025/2026 Comerciários Aracaju"></div>
      <div class="field two">
        <div><label>Nº registro MTE</label><input id="c_reg" value="${Util.escape(c.numeroRegistro || '')}" placeholder="SE000000/2025"></div>
        <div><label>Data-base</label><select id="c_base">${mesOpts}</select></div>
      </div>
      <div class="field two">
        <div><label>Abrangência territorial</label>
          <input id="c_abr" value="${Util.escape(c.abrangencia || '')}" placeholder="Ex.: Aracaju/SE"></div>
        <div><label>UF <span class="mini">(p/ busca no Mediador)</span></label>
          <input id="c_uf" maxlength="2" value="${Util.escape(c.uf || Util.parseUF(c.abrangencia) || '')}" placeholder="SE" style="text-transform:uppercase"></div>
      </div>
      <div class="field two">
        <div><label>Início da vigência</label><input id="c_vi" type="date" value="${c.vigenciaInicio || ''}"></div>
        <div><label>Fim da vigência</label><input id="c_vf" type="date" value="${c.vigenciaFim || ''}"></div>
      </div>
      <div class="field"><label>PDF da convenção</label>
        <div class="drop ${c.pdfName ? 'has' : ''}" id="c_drop">
          ${c.pdfName ? '📎 ' + Util.escape(c.pdfName) : '<b>Toque para anexar</b> o PDF da CCT/ACT'}
        </div>
        <input id="c_pdf" type="file" accept="application/pdf" hidden>
        <button class="btn gold block sm" id="c_absorver" disabled style="margin-top:8px">🤖 Absorver PDF com IA (preenche tudo)</button>
        <div class="mini" id="c_ia_status" style="margin-top:6px"></div>
      </div>
      <button class="btn primary block" data-save-conv="${c.id || ''}">Salvar convenção</button>`;
  }

  /* ---- Editor de REGRAS (a tela de "conferir o que a IA absorveu") ---- */
  async function editorRegras(id) {
    const c = await DB.get('convencoes', id);
    if (!c) return;
    const r = c.regras || Schema.emptyRegras();
    _regrasCache = JSON.parse(JSON.stringify(r)); // trabalho em cima de uma cópia
    _regrasConvId = id;

    const body = openModal(renderRegras(c, _regrasCache));
    body.scrollTop = 0;
  }
  let _regrasCache = null, _regrasConvId = null;

  function renderRegras(c, r) {
    const estOpts = Schema.tiposEstabilidade;
    return `
      <div class="mh"><h3>Regras absorvidas</h3><button class="iconbtn" data-close>✕</button></div>
      <div class="mini" style="margin:-4px 2px 12px">${Util.escape(c.titulo)}</div>

      <div class="notice gold" style="margin-bottom:14px">
        🤖 Quando ligarmos a IA, estes campos vêm <b>pré-preenchidos</b> da leitura do PDF.
        Aqui é onde você <b>confere e ajusta</b> antes de aprovar. Por enquanto, dá pra preencher à mão.
      </div>

      <!-- PISOS -->
      <div class="section-hd">Pisos salariais por função</div>
      <div id="reg_pisos">${(r.pisos || []).map(pisoRow).join('') || '<div class="mini" style="padding:6px 0">Nenhum piso adicionado.</div>'}</div>
      <button class="btn ghost sm" data-add-piso style="margin-top:8px">+ Adicionar piso</button>

      <!-- TEMPO DE SERVIÇO -->
      <div class="section-hd">Adicional por tempo de serviço (triênio etc.)</div>
      <label class="chip ${r.tempoServico.aplica ? 'on' : ''}" data-toggle="tempoServico.aplica" style="display:inline-block">${r.tempoServico.aplica ? '✓ ' : ''}A convenção prevê</label>
      <div class="field two" style="margin-top:10px">
        <div><label>Tipo</label><select data-bind="tempoServico.tipo">${Schema.tiposTempoServico.map(t => `<option value="${t.v}" ${r.tempoServico.tipo === t.v ? 'selected' : ''}>${t.l}</option>`).join('')}</select></div>
        <div><label>% por período</label><input data-bind="tempoServico.percentual" inputmode="decimal" value="${r.tempoServico.percentual ?? ''}" placeholder="Ex.: 3"></div>
      </div>
      <div class="field"><label>Condições / teto (texto)</label><input data-bind="tempoServico.condicoes" value="${Util.escape(r.tempoServico.condicoes || '')}" placeholder="Ex.: sobre o salário base, sem limite"></div>

      <!-- PRODUTIVIDADE -->
      <div class="section-hd">Produtividade / prêmio</div>
      <label class="chip ${r.produtividade.aplica ? 'on' : ''}" data-toggle="produtividade.aplica" style="display:inline-block">${r.produtividade.aplica ? '✓ ' : ''}A convenção prevê</label>
      <div class="field two" style="margin-top:10px">
        <div><label>Tipo</label><select data-bind="produtividade.tipo"><option value="percentual" ${r.produtividade.tipo === 'percentual' ? 'selected' : ''}>Percentual</option><option value="valor_fixo" ${r.produtividade.tipo === 'valor_fixo' ? 'selected' : ''}>Valor fixo</option></select></div>
        <div><label>Valor / %</label><input data-bind="produtividade.valor" inputmode="decimal" value="${r.produtividade.valor ?? ''}"></div>
      </div>
      <div class="field"><label>Condições</label><input data-bind="produtividade.condicoes" value="${Util.escape(r.produtividade.condicoes || '')}"></div>

      <!-- ADIANTAMENTO -->
      <div class="section-hd">Adiantamento salarial (vale)</div>
      <label class="chip ${r.adiantamento.obrigatorio ? 'on' : ''}" data-toggle="adiantamento.obrigatorio" style="display:inline-block">${r.adiantamento.obrigatorio ? '✓ ' : ''}Obrigatório</label>
      <div class="field two" style="margin-top:10px">
        <div><label>% do salário</label><input data-bind="adiantamento.percentual" inputmode="decimal" value="${r.adiantamento.percentual ?? ''}"></div>
        <div><label>Dia limite de pagamento</label><input data-bind="adiantamento.diaLimite" inputmode="numeric" value="${r.adiantamento.diaLimite ?? ''}"></div>
      </div>

      <!-- ADICIONAIS -->
      <div class="section-hd">Adicionais (%)</div>
      <div class="field two">
        <div><label>Hora extra</label><input data-bind="adicionais.horaExtra" inputmode="decimal" value="${r.adicionais.horaExtra ?? ''}"></div>
        <div><label>H.E. 100% (dom/feriado)</label><input data-bind="adicionais.horaExtra100" inputmode="decimal" value="${r.adicionais.horaExtra100 ?? ''}"></div>
      </div>
      <div class="field two">
        <div><label>Adicional noturno</label><input data-bind="adicionais.noturno" inputmode="decimal" value="${r.adicionais.noturno ?? ''}"></div>
        <div><label>Insalubridade (texto)</label><input data-bind="adicionais.insalubridade" value="${Util.escape(r.adicionais.insalubridade || '')}"></div>
      </div>

      <!-- ESTABILIDADES -->
      <div class="section-hd">Estabilidades previstas</div>
      <div id="reg_est">${(r.estabilidades || []).map(estRow).join('') || '<div class="mini" style="padding:6px 0">Nenhuma.</div>'}</div>
      <button class="btn ghost sm" data-add-est style="margin-top:8px">+ Adicionar estabilidade</button>

      <!-- BENEFÍCIOS -->
      <div class="section-hd">Benefícios</div>
      <div id="reg_ben">${(r.beneficios || []).map(benRow).join('') || '<div class="mini" style="padding:6px 0">Nenhum.</div>'}</div>
      <button class="btn ghost sm" data-add-ben style="margin-top:8px">+ Adicionar benefício</button>

      <!-- OBSERVAÇÕES -->
      <div class="section-hd">Observações da convenção</div>
      <div class="field"><textarea data-bind="observacoes" placeholder="Cláusulas relevantes que a conferência deve considerar...">${Util.escape(r.observacoes || '')}</textarea></div>

      <div class="divider"></div>
      <label class="chip ${c.aprovada ? 'on' : ''}" id="chk_aprov" data-aprov style="display:inline-block;margin-bottom:12px">${c.aprovada ? '✓ ' : ''}Marcar regras como conferidas/aprovadas</label>
      <button class="btn primary block" data-save-regras>Salvar regras</button>`;
  }

  async function rodarConferencia(empId, variaveis) {
    const result = $('#cf_result');
    if (!empId) { toast('Selecione a empresa', 'err'); return; }
    const emp = await DB.get('empresas', empId);
    const convs = await DB.list('convencoes');
    const vinc = (emp.convencaoIds || []).map(id => convs.find(c => c.id === id)).filter(Boolean);
    if (!vinc.length) { toast('Empresa sem convenção vinculada', 'err'); return; }

    // Mostra o "plano de conferência" derivado das regras — prova que o fluxo
    // empresa → convenção → regras está ligado. O motor completo (ler o PDF e
    // apontar erros por funcionário) entra quando você mandar uma folha real.
    const checks = [];
    vinc.forEach(c => {
      const r = c.regras || Schema.emptyRegras();
      (r.pisos || []).forEach(p => checks.push(`Piso de <b>${Util.escape(p.funcao)}</b>: salário ≥ ${Util.formatBRL(Util.parseNum(p.valor))}`));
      if (r.tempoServico && r.tempoServico.aplica) checks.push(`Triênio/tempo de serviço: <b>${r.tempoServico.percentual || '?'}%</b> por período`);
      if (r.produtividade && r.produtividade.aplica) checks.push('Produtividade prevista na convenção');
      if (r.adiantamento && r.adiantamento.obrigatorio) checks.push(`Adiantamento obrigatório de <b>${r.adiantamento.percentual}%</b> até dia ${r.adiantamento.diaLimite}`);
      (r.estabilidades || []).forEach(e => checks.push(`Estabilidade: ${Util.escape((Schema.tiposEstabilidade.find(t => t.v === e.tipo) || {}).l || e.tipo)}`));
      checks.push('Encargos: conferir incidência de INSS/FGTS nas rubricas');
    });

    result.innerHTML = `
      <div class="section-hd">Plano de conferência (a partir da convenção)</div>
      <div class="card">
        <p class="mini" style="margin-top:0">Estas são as verificações que serão aplicadas automaticamente à folha desta empresa:</p>
        ${checks.map(c => `<div class="list-row">✅ <span>${c}</span></div>`).join('')}
      </div>
      <div class="notice gold">
        🚧 <b>Próximo passo:</b> ligar a leitura automática do PDF da folha + o motor de auditoria (IA).
        Aí cada item acima vira <b>erro</b> ou <b>alerta</b> por funcionário, com o relatório em PDF.
        Pra isso eu preciso de <b>uma folha real de exemplo</b> (pode tarjar nomes/CPF).
      </div>
      ${variaveis && variaveis.trim() ? `<div class="notice" style="margin-top:10px">📝 Lançamentos anotados:<br>${Util.escape(variaveis).replace(/\n/g, '<br>')}</div>` : ''}`;
    result.scrollIntoView({ behavior: 'smooth', block: 'start' });
  }

  /* ============================================================

  const compKey = c => { const m = /^(\d{1,2})\/(\d{4})$/.exec((c || '').trim()); return m ? m[2] + m[1].padStart(2, '0') : '000000'; };
  async function viewHistorico() {
    const folhas = await DB.list('folhas');
    if (!folhas.length) return `<div class="view">
      <div class="view-title">Histórico de folhas</div>
      <p class="view-sub">Comparativo mês a mês entre as folhas conferidas.</p>
      ${emptyState('📊', 'Ainda sem folhas conferidas', 'Quando você conferir uma folha na aba Conferência, ela fica guardada aqui — e dá para re-auditar de graça sempre que o motor for atualizado.')}
    </div>`;
    const [emps, convs] = await Promise.all([DB.list('empresas'), DB.list('convencoes')]);
    const nomeEmp = id => { const e = emps.find(x => x.id === id); return e ? e.nome : '(empresa removida)'; };
    const porEmp = {};
    folhas.forEach(f => { (porEmp[f.empresaId] = porEmp[f.empresaId] || []).push(f); });
    const cards = Object.keys(porEmp).map(empId => {
      const lista = porEmp[empId].slice().sort((a, b) => compKey(b.competencia).localeCompare(compKey(a.competencia)));
      const rows = lista.map(f => `
        <div class="list-row">
          <span><b>${Util.escape(f.competencia || '—')}</b><br>
            <span class="mini">${(f.funcionarios || []).length} func. · conferida ${Util.formatDateBR((f.auditadaEm || '').slice(0, 10))}</span></span>
          <span class="grow"></span>
          <button class="btn sm" data-reaudit="${f.id}">🔁 Re-auditar</button>
          <button class="iconbtn" data-del-folha="${f.id}" title="Excluir">🗑</button>
        </div>`).join('');
      return `<div class="card"><div class="list-row" style="border-bottom:1px solid var(--line)"><b>${Util.escape(nomeEmp(empId))}</b></div>${rows}</div>`;
    }).join('');
    return `<div class="view">
      <div class="view-title">Histórico de folhas</div>
      <p class="view-sub">Folhas já conferidas. <b>Re-auditar</b> roda o motor atualizado sem gastar leitura de PDF de novo.</p>
      ${cards}
      <div class="notice">🔒 As folhas ficam só neste aparelho (contêm CPF). Nada vai para o GitHub nem para a nuvem.</div>
    </div>`;
  }
  async function reauditarFolha(folhaId) {

  async function viewDuvidas() {

    if (!ativas.length) return `<div class="view">

    </div>`;
  }
  function wireDuvidas() {
    const btn = $('#dv_ask'); if (!btn) return;
    btn.addEventListener('click', async () => {
      const convId = $('#dv_conv') && $('#dv_conv').value;
      const q = ($('#dv_q').value || '').trim();
      const status = $('#dv_status'), ans = $('#dv_ans');
      if (!q) return toast('Escreva a pergunta', 'warn');
      if (!convId) return toast('Escolha a convenção', 'warn');
      const cfg = await DB.getConfig();
      if (!cfg.apiKey) { toast('Configure a chave da API em Configurações (menu ☰)', 'err'); return; }
      const conv = await DB.get('convencoes', convId);
      btn.disabled = true; btn.textContent = '🤖 Consultando...';
      status.textContent = 'A IA está lendo as regras da convenção...';
      ans.innerHTML = '';
      try {
        const resp = await IA.perguntarRegras(conv, q, cfg);
        ans.innerHTML = `<div class="card"><div class="section-hd">Resposta</div>
          <div style="white-space:pre-wrap;line-height:1.5">${Util.escape(resp)}</div>
          <div class="mini" style="margin-top:10px">⚖️ Confira sempre no texto oficial da convenção — a resposta é um apoio, não vale como parecer jurídico.</div></div>`;
        status.textContent = '';
      } catch (e) {
        status.innerHTML = '<span style="color:var(--err)">Erro: ' + Util.escape(e.message) + '</span>';
      }
      btn.disabled = false; btn.textContent = 'Perguntar';
    });
  }

  /* ------------- helpers ------------- */
  function emptyState(em, t, p) {
    return `<div class="empty"><div class="em">${em}</div><h3 style="margin:10px 0 0">${t}</h3><p>${p}</p></div>`;
  }
  function pathVal(obj, path) { return path.split('.').reduce((o, k) => (o || {})[k], obj); }
  function pathSet(obj, path, val) {
    const ks = path.split('.'); let o = obj;
    for (let i = 0; i < ks.length - 1; i++) o = o[ks[i]];
    o[ks[ks.length - 1]] = val;
  }

  /* ------------- render dispatcher ------------- */
  const VIEWS = {
    painel: viewPainel, sindicatos: viewSindicatos, convencoes: viewConvencoes,
    empresas: viewEmpresas, conferencia: viewConferencia, historico: viewHistorico, duvidas: viewDuvidas,
  };
  async function render(arg) {
    renderNav();
    app.innerHTML = '<div class="view"><div class="empty"><div class="em">⏳</div></div></div>';
    app.innerHTML = await VIEWS[state.view](arg);
    if (state.view === 'conferencia') wireConferencia();
    if (state.view === 'duvidas') wireDuvidas();

  function wireConferencia() {
    const emp = $('#cf_emp'); if (!emp) return;
    if (emp.value) renderVinculo(emp.value);
    emp.addEventListener('change', () => renderVinculo(emp.value));
    $('#cf_drop').addEventListener('click', () => $('#cf_pdf').click());
    $('#cf_pdf').addEventListener('change', e => {
      const f = e.target.files[0]; if (!f) return;
      $('#cf_drop').classList.add('has'); $('#cf_drop').innerHTML = '📎 ' + Util.escape(f.name);
      const b = $('#cf_absorver'); if (b) b.disabled = false;
    });
    $('#cf_run').addEventListener('click', () => rodarConferencia($('#cf_emp').value, $('#cf_var').value));
    $('#cf_import').addEventListener('click', importFolhaPick);
    const abs = $('#cf_absorver');
    if (abs) abs.addEventListener('click', () => absorverFolhaPDF($('#cf_pdf').files[0]));
  }
  async function absorverFolhaPDF(file) {
    const btn = $('#cf_absorver'), status = $('#cf_ia_status');
    if (!file) return;
    const cfg = await DB.getConfig();
    if (!cfg.apiKey) { toast('Configure a chave da API em Configurações (menu ☰)', 'err'); return; }
    btn.disabled = true; btn.textContent = '🤖 Lendo a folha... aguarde';
    status.textContent = 'A IA está lendo a folha. Pode levar de 30s a 1,5 min se tiver muitos funcionários.';
    try {
      const b64 = await fileToBase64(file);
      const folha = await IA.absorverFolha(b64, cfg);
      btn.textContent = '✅ Lida — auditando';
      status.innerHTML = '✅ Folha lida. Rodando a conferência...';
      await importFolha(folha);
      btn.textContent = '🤖 Ler folha com IA e auditar'; btn.disabled = false;
    } catch (e) {
      status.innerHTML = '<span style="color:var(--err)">Erro: ' + Util.escape(e.message) + '</span>';
      btn.disabled = false; btn.textContent = '🤖 Tentar de novo';
    }
  }

  /* ---- importar folha estruturada (JSON) e auditar ---- */
  let _pendingFolha = null;
  function importFolhaPick() {
    const inp = document.createElement('input');
    inp.type = 'file'; inp.accept = 'application/json,.json';
    inp.onchange = async () => {
      const f = inp.files[0]; if (!f) return;
      try { await importFolha(JSON.parse(await f.text())); }
      catch (e) { toast('Folha inválida: ' + e.message, 'err'); }
    };
    inp.click();
  }
  async function importFolha(folha) {
    if (!folha || !folha.funcionarios) return toast('JSON sem "funcionarios"', 'err');
    const cnpj = (folha.empresaCnpj || '').replace(/\D/g, '');
    let emp = cnpj ? (await DB.where('empresas', e => (e.cnpj || '') === cnpj))[0] : null;
    const selId = $('#cf_emp') && $('#cf_emp').value;
    if (!emp && selId) emp = await DB.get('empresas', selId);
    if (!emp) { _pendingFolha = folha; return abrirCadastroEmpresaDaFolha(folha, cnpj, null); }
    const convs = await DB.list('convencoes');
    const vinc = (emp.convencaoIds || []).map(id => convs.find(c => c.id === id)).filter(Boolean);
    if (!vinc.length) { _pendingFolha = folha; toast('Marque a convenção desta empresa para auditar', 'warn'); return abrirCadastroEmpresaDaFolha(folha, cnpj, emp); }
    const conv = vinc[0];
    const cfg = await DB.getConfig();
    const rel = Audit.run(folha, conv, cfg);
    await DB.add('folhas', Object.assign({ empresaId: emp.id, auditadaEm: new Date().toISOString() }, folha));
    renderRelatorio(rel, folha, conv, emp, vinc.length);
  }

  async function abrirCadastroEmpresaDaFolha(folha, cnpj, empExistente) {
    const convs = await DB.list('convencoes');
    const e = empExistente || { nome: folha.empresaNome || '', cnpj };
    const body = openModal(formEmpresa(e, convs));
    const nota = empExistente
      ? '🔗 Esta empresa está cadastrada, mas <b>sem convenção</b>. Marque a(s) convenção(ões) e salve para eu auditar a folha.'
      : '🆕 A empresa da folha <b>não está cadastrada</b>. Já puxei a razão social e o CNPJ — só marque a(s) convenção(ões) e salve.';
    body.insertAdjacentHTML('afterbegin', `<div class="notice gold" style="margin-bottom:12px">${nota}</div>`);
    if (!convs.length) body.insertAdjacentHTML('beforeend', '<div class="notice" style="margin-top:10px">Você ainda não tem convenções. Cadastre/importe a convenção desta categoria primeiro (ou crie o regime CLT).</div>');
  }

  function relatorioHtml(rel) {
    const r = rel.resumo;
    const grp = (arr, cls, icon, titulo) => arr.length ? `

  /* ---- form convenção: upload + absorção por IA + save ---- */
  let _convAbsorb = null;
  function fileToBase64(file) {
    return new Promise((res, rej) => {
      const r = new FileReader();
      r.onload = () => res(String(r.result).split(',')[1]);
      r.onerror = () => rej(new Error('não consegui ler o arquivo'));
      r.readAsDataURL(file);
    });
  }
  function wireConvForm(body, c) {
    _convAbsorb = null;
    const drop = $('#c_drop'), pdf = $('#c_pdf'), absBtn = $('#c_absorver');
    if (drop) {
      drop.addEventListener('click', () => pdf.click());

        if (absBtn) { absBtn.disabled = false; }
      });
    }
    if (absBtn) absBtn.addEventListener('click', () => absorverConvPDF(pdf.files[0]));
  }
  async function absorverConvPDF(file) {
    const btn = $('#c_absorver'), status = $('#c_ia_status');
    if (!file) return;
    const cfg = await DB.getConfig();
    if (!cfg.apiKey) { toast('Configure a chave da API em Configurações (menu ☰)', 'err'); return; }
    btn.disabled = true; btn.textContent = '🤖 Lendo o PDF... aguarde';
    status.textContent = 'A IA está lendo a convenção. Pode levar de 20s a 1 min.';
    try {
      const b64 = await fileToBase64(file);
      const bundle = await IA.absorverConvencao(b64, cfg);
      const conv = bundle.convencao || {};
      const set = (id, v) => { const el = $(id); if (el && v != null && v !== '') el.value = v; };
      set('#c_tit', conv.titulo); set('#c_reg', conv.numeroRegistro); set('#c_abr', conv.abrangencia);
      set('#c_uf', (conv.uf || '').toUpperCase()); set('#c_vi', conv.vigenciaInicio); set('#c_vf', conv.vigenciaFim);
      if ($('#c_base') && conv.dataBaseMes) $('#c_base').value = conv.dataBaseMes;
      if (bundle.sindicato && bundle.sindicato.cnpj && $('#c_sind') && !$('#c_sind').value) {
        // se nenhum sindicato escolhido, tenta casar pelo CNPJ absorvido
        const cnpj = (bundle.sindicato.cnpj || '').replace(/\D/g, '');
        const s = (await DB.where('sindicatos', x => (x.cnpj || '') === cnpj))[0];
        if (s) $('#c_sind').value = s.id;
      }
      _convAbsorb = { regras: Object.assign(Schema.emptyRegras(), conv.regras || {}) };
      status.innerHTML = '✅ <b>Preenchido pela IA.</b> Confira os campos e salve. Depois abra ⚙️ Regras para revisar.';
      btn.textContent = '✅ Absorvido — pode salvar';
    } catch (e) {
      status.innerHTML = '<span style="color:var(--err)">Erro: ' + Util.escape(e.message) + '</span>';
      btn.disabled = false; btn.textContent = '🤖 Tentar absorver de novo';
    }
  }

    const sindicatoId = $('#c_sind').value;
    const titulo = $('#c_tit').value.trim();

  /* ---- importar convenção (JSON gerado pela IA) ---- */
  function importConvPick() {
    const inp = document.createElement('input');
    inp.type = 'file'; inp.accept = 'application/json,.json';
    inp.onchange = async () => {
      const f = inp.files[0]; if (!f) return;
      try { await importConvencao(JSON.parse(await f.text())); }
      catch (e) { toast('Arquivo inválido: ' + e.message, 'err'); }
    };
    inp.click();
  }
  async function importConvencao(bundle, opts) {
    opts = opts || {};
    if (!bundle || !bundle.convencao) { toast('JSON sem "convencao"', 'err'); return null; }
    const s = bundle.sindicato || {};
    const cnpj = (s.cnpj || '').replace(/\D/g, '');
    let sind = null;
    if (cnpj) sind = (await DB.where('sindicatos', x => (x.cnpj || '') === cnpj))[0];
    if (!sind && s.nome) sind = (await DB.where('sindicatos', x => x.nome === s.nome))[0];
    if (!sind) sind = await DB.add('sindicatos', { nome: s.nome || 'Sindicato importado', cnpj, categoria: s.categoria || '' });
    const c = bundle.convencao;
    const rec = Object.assign({ regras: Schema.emptyRegras(), aprovada: false }, c, { sindicatoId: sind.id });
    // mescla regras importadas sobre a estrutura padrão (garante todos os campos)
    rec.regras = Object.assign(Schema.emptyRegras(), c.regras || {});
    if (!rec.uf) rec.uf = Util.parseUF(rec.abrangencia);
    // dedupe: mesma convenção já cadastrada (mesmo sindicato + nº de registro OU título)?
    // Atualiza no lugar — preserva o id, então o vínculo da empresa e o histórico continuam valendo.
    const reg = (c.numeroRegistro || '').trim();
    const existente = opts.substituir === false ? null : (await DB.where('convencoes', x =>
      !x.arquivada && x.sindicatoId === sind.id &&
      ((reg && (x.numeroRegistro || '').trim() === reg) || (x.titulo || '') === (c.titulo || ''))
    ))[0];
    if (existente) {
      rec.aprovada = existente.aprovada;   // não rebaixa uma convenção já aprovada
      const saved = await DB.update('convencoes', existente.id, rec);
      if (!opts.silent) { toast('Convenção atualizada no lugar ✓ (vínculos preservados)', 'ok'); render(); }
      return saved;
    }
    const saved = await DB.add('convencoes', rec);
    if (!opts.silent) { toast('Convenção importada ✓ — revise e aprove', 'ok'); render(); }
    return saved;
  }
